# Azure Pipelines - Parallel Test Jobs
# Each language runs as a separate parallel job for faster execution

trigger:
  branches:
    include:
      - '*'
  paths:
    exclude:
      - README.md
      - '*.md'

pr:
  branches:
    include:
      - '*'

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Test
  displayName: 'Run All Tests'
  jobs:
  - job: JavaTests
    displayName: 'Java Tests'
    steps:
    - checkout: self

    - script: |
        echo "##[section]Setting up Java 17"
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
        java -version
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
      displayName: 'Set up Java 17'

    - script: |
        echo "##[section]Running Java Tests"
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        java -version
        if [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
          echo "Found Gradle project"
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew test --no-daemon || exit 1
          else
            gradle test --no-daemon || exit 1
          fi
        elif [ -f "pom.xml" ]; then
          echo "Found Maven project"
          mvn test -B || exit 1
        else
          echo "No Java build file found, skipping Java tests"
        fi
      displayName: 'Run Java Tests'
      continueOnError: false

  - job: GoTests
    displayName: 'Go Tests'
    steps:
    - checkout: self

    - script: |
        echo "##[section]Setting up Go 1.21"
        wget -q -O - https://go.dev/dl/go1.21.6.linux-amd64.tar.gz | sudo tar -xz -C /usr/local
        export PATH=$PATH:/usr/local/go/bin
        go version
      displayName: 'Set up Go 1.21'

    - script: |
        echo "##[section]Running Go Tests"
        export PATH=$PATH:/usr/local/go/bin
        failed=0
        while IFS= read -r -d '' gomod; do
          dir=$(dirname "$gomod")
          echo "Testing Go project in $dir"
          (cd "$dir" && go mod download && go test -v ./...) || failed=1
        done < <(find . -name go.mod -not -path "*/vendor/*" -print0)
        if [ $failed -eq 1 ]; then
          exit 1
        fi
        if [ -z "$(find . -name go.mod -not -path "*/vendor/*")" ]; then
          echo "No Go projects found, skipping Go tests"
        fi
      displayName: 'Run Go Tests'
      continueOnError: false

  - job: PythonTests
    displayName: 'Python Tests'
    steps:
    - checkout: self

    - script: |
        echo "##[section]Running Python Tests"
        python3 -m pip install --upgrade pip
        pip3 install pytest pytest-cov
        failed=0
        while IFS= read -r -d '' reqfile; do
          dir=$(dirname "$reqfile")
          filename=$(basename "$reqfile")
          echo "Installing dependencies from $reqfile"
          (cd "$dir" && pip3 install -r "$filename") || failed=1
        done < <(find . -name requirements.txt -not -path "*/venv/*" -not -path "*/__pycache__/*" -print0)
        if [ $failed -eq 1 ]; then
          exit 1
        fi
        pytest -v || exit 1
        if [ -z "$(find . -name requirements.txt -not -path "*/venv/*" -not -path "*/__pycache__/*")" ] && [ -z "$(find . -name 'test_*.py' -o -name '*_test.py')" ]; then
          echo "No Python tests found, skipping Python tests"
        fi
      displayName: 'Run Python Tests'
      continueOnError: false

  - job: JavaScriptTests
    displayName: 'JavaScript/TypeScript Tests'
    steps:
    - checkout: self

    - script: |
        echo "##[section]Setting up Node.js 20"
        curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
        sudo apt-get install -y nodejs
        node --version
        npm --version
      displayName: 'Set up Node.js 20'

    - script: |
        echo "##[section]Running JavaScript/TypeScript Tests"
        failed=0
        while IFS= read -r -d '' pkgjson; do
          dir=$(dirname "$pkgjson")
          if [[ "$dir" == *"node_modules"* ]]; then
            continue
          fi
          echo "Testing Node.js project in $dir"
          (cd "$dir" && npm install && npm test) || failed=1
        done < <(find . -name package.json -not -path "*/node_modules/*" -print0)
        if [ $failed -eq 1 ]; then
          exit 1
        fi
        if [ -z "$(find . -name package.json -not -path "*/node_modules/*")" ]; then
          echo "No Node.js projects found, skipping JavaScript tests"
        fi
      displayName: 'Run JavaScript/TypeScript Tests'
      continueOnError: false

  - job: RubyTests
    displayName: 'Ruby Tests'
    steps:
    - checkout: self

    - script: |
        echo "##[section]Running Ruby Tests"
        failed=0
        while IFS= read -r -d '' gemfile; do
          dir=$(dirname "$gemfile")
          echo "Testing Ruby project in $dir"
          (cd "$dir" && bundle install && bundle exec rspec) || failed=1
        done < <(find . -name Gemfile -not -path "*/vendor/*" -print0)
        if [ $failed -eq 1 ]; then
          exit 1
        fi
        if [ -z "$(find . -name Gemfile -not -path "*/vendor/*")" ]; then
          echo "No Ruby projects found, skipping Ruby tests"
        fi
      displayName: 'Run Ruby Tests'
      continueOnError: false
