# Test instructions for security-focused reviews
confidence_threshold: 70

skip_categories:
  - "performance"
  - "minor optimizations"
  - "code style"

priority_areas:
  Authentication & Authorization:
    - "Hardcoded credentials and API keys"
    - "Weak password validation"
    - "Missing authorization checks"
    - "Authentication bypass vulnerabilities"
    - "JWT token validation issues"
    - "Using == instead of === in security contexts"

  Access Control:
    - "Missing permission checks before sensitive operations"
    - "Privilege escalation risks"
    - "Insecure direct object references"

  Cryptography:
    - "Weak encryption algorithms"
    - "Hardcoded encryption keys"
    - "Missing signature verification"

response_format:
  structure: "Security Risk + Impact + Remediation"
  require_actionable: true

review_philosophy:
  actionability: "Flag all security vulnerabilities regardless of complexity"
