# Custom Review Instructions for test-repo
# Configuration for AI code review behavior

confidence_threshold: 20

skip_categories:
  - style
  - formatting
  - minor naming suggestions

priority_areas:
  Security & Safety:
    - SQL injection risks
    - XSS vulnerabilities
    - Authentication/authorization issues
    - Sensitive data exposure

  Correctness Issues:
    - Logic errors
    - Null pointer exceptions
    - Off-by-one errors
    - Race conditions

  Code Efficiency:
    - Inefficient algorithms
    - Unnecessary iterations
    - Memory leaks
    - Database query optimization

response_format:
  structure: "Problem + Why + Fix"
  max_description_length: 500
  require_actionable: true

review_philosophy: "Focus on bugs, security vulnerabilities, and maintainability issues. Skip style and formatting concerns."
