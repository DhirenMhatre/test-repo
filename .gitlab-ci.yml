stages:
  - test

python-tests:
  stage: test
  image: python:3.11
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - python -m pip install --upgrade pip
    - pip install pytest pytest-cov
    - |
      while IFS= read -r -d '' reqfile; do
        echo "Installing from $reqfile"
        pip install -r "$reqfile"
      done < <(find . -name requirements.txt -print0)
    - pytest -v

go-tests:
  stage: test
  image: golang:1.21
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - |
      failed=0
      while IFS= read -r -d '' gomod; do
        dir=$(dirname "$gomod")
        echo "Testing in $dir"
        (cd "$dir" && go mod download && go test -v ./...) || failed=1
      done < <(find . -name go.mod -print0)
      exit $failed

ruby-tests:
  stage: test
  image: ruby:3.2
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - |
      failed=0
      while IFS= read -r -d '' gemfile; do
        dir=$(dirname "$gemfile")
        echo "Testing in $dir"
        (cd "$dir" && bundle install && bundle exec rspec) || failed=1
      done < <(find . -name Gemfile -print0)
      exit $failed

javascript-tests:
  stage: test
  image: node:20
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - |
      failed=0
      while IFS= read -r -d '' pkgjson; do
        dir=$(dirname "$pkgjson")
        echo "Testing in $dir"
        (cd "$dir" && npm install && npm test) || failed=1
      done < <(find . -name package.json -not -path "*/node_modules/*" -print0)
      exit $failed

java-tests:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - |
      if [ -f "pom.xml" ]; then
        echo "Found Maven project"
        mvn test -B
      elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
        echo "Found Gradle project"
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew test
        else
          apt-get update && apt-get install -y gradle
          gradle test
        fi
      else
        echo "No Maven or Gradle build file found"
        exit 1
      fi
