stages:
  - test

python-tests:
  stage: test
  image: python:3.11
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - python -m pip install --upgrade pip
    - pip install pytest pytest-cov
    - |
      while IFS= read -r -d '' reqfile; do
        echo "Installing from $reqfile"
        pip install -r "$reqfile"
      done < <(find . -name requirements.txt -print0)
    - pytest -v

go-tests:
  stage: test
  image: golang:1.21
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - |
      failed=0
      while IFS= read -r -d '' gomod; do
        dir=$(dirname "$gomod")
        echo "Testing in $dir"
        (cd "$dir" && go mod download && go test -v ./...) || failed=1
      done < <(find . -name go.mod -print0)
      exit $failed

ruby-tests:
  stage: test
  image: ruby:3.2
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - |
      failed=0
      while IFS= read -r -d '' gemfile; do
        dir=$(dirname "$gemfile")
        echo "Testing in $dir"
        (cd "$dir" && bundle install && bundle exec rspec) || failed=1
      done < <(find . -name Gemfile -print0)
      exit $failed

javascript-tests:
  stage: test
  image: node:20
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - |
      failed=0
      while IFS= read -r -d '' pkgjson; do
        dir=$(dirname "$pkgjson")
        echo "Testing in $dir"
        (cd "$dir" && npm install && npm test) || failed=1
      done < <(find . -name package.json -not -path "*/node_modules/*" -print0)
      exit $failed

java-tests:
  stage: test
  image: gradle:8.5-jdk17
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - |
      failed=0

      # Find and test Gradle projects
      while IFS= read -r -d '' gradlefile; do
        dir=$(dirname "$gradlefile")
        echo "Testing Gradle project in $dir"
        if [ -f "$dir/gradlew" ]; then
          (cd "$dir" && chmod +x gradlew && ./gradlew test --no-daemon) || failed=1
        else
          (cd "$dir" && gradle test --no-daemon) || failed=1
        fi
      done < <(find . -name build.gradle -o -name build.gradle.kts | grep -v '/build/' | tr '\n' '\0')

      # Find and test Maven projects (switch to Maven image if found)
      if find . -name pom.xml -not -path "*/target/*" | grep -q .; then
        echo "Maven projects found but using Gradle image - Maven tests skipped"
        echo "If you have Maven projects, use separate maven-tests job with maven:3.9-eclipse-temurin-17 image"
      fi

      exit $failed
