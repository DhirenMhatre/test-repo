name: Java Security Audit

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  java-security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Run OWASP Dependency Check
      working-directory: java-service
      run: |
        echo "=== OWASP DEPENDENCY CHECK START ==="
        mvn org.owasp:dependency-check-maven:10.0.4:check -DfailBuildOnCVSS=11 -Dformat=JSON || true
        echo "=== OWASP DEPENDENCY CHECK END ==="

    - name: Display JSON Report
      working-directory: java-service
      run: |
        if [ -f target/dependency-check-report.json ]; then
          echo "=== JSON REPORT START ==="
          cat target/dependency-check-report.json
          echo "=== JSON REPORT END ==="
        fi
