name: Security Audit

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  security-audit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # JavaScript/Node.js Security Audit
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install JavaScript dependencies
      working-directory: frontend
      run: npm install --package-lock-only || true

    - name: Run npm audit
      working-directory: frontend
      run: |
        echo "=== NPM AUDIT START ==="
        npm audit --json || true
        echo "=== NPM AUDIT END ==="

    # Python Security Audit
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Run pip-audit
      working-directory: python-service
      run: |
        echo "=== PIP AUDIT START ==="
        pip-audit --format json || true
        echo "=== PIP AUDIT END ==="

    # Go Security Audit
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: Run govulncheck
      working-directory: go-service
      run: |
        echo "=== GO VULN CHECK START ==="
        govulncheck -json ./... || true
        echo "=== GO VULN CHECK END ==="

    # Ruby Security Audit
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'

    - name: Install bundler-audit
      run: gem install bundler-audit

    - name: Update bundler-audit database
      run: bundle-audit update

    - name: Run bundler-audit
      working-directory: ruby-service
      run: |
        echo "=== BUNDLER AUDIT START ==="
        bundle install
        bundle-audit check || true
        echo "=== BUNDLER AUDIT END ==="
